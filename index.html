/* ── HOST creates room ── */
function olCreate(){
  var name=($id('ol-nm')&&$id('ol-nm').value.trim())||'Host';
  OL.name=name;OL.isHost=true;OL.pIdx=0;
  olShowLobby('…generuję kod…',true,name);
  olStat('Ładowanie…','#88aaff');
  loadPeerJS(function(){
    try{
      OL.peer=new Peer(undefined,{debug:0});
      OL.peer.on('open',function(id){
        OL.code=id;
        var cb=$id('ol-cbox');if(cb){cb.textContent=id;cb.style.color='#f5c842';}
        olStat('Wyślij kod znajomemu i czekaj','#88aaff');
      });
      OL.peer.on('connection',function(conn){
        // Close any old connection first
        if(OL.conn&&OL.conn!==conn){try{OL.conn.close();}catch(e){}}
        OL.conn=conn;
        // Set up data handler FIRST so we don't miss early messages
        conn.on('data',function(d){olRecv(d);});
        conn.on('open',function(){
          olStat('Gość połączony, czekam na dane…','#ffcc44');
          // Host sends a ping so guest knows to re-send hi if needed
          setTimeout(function(){olSend({t:'ping'});},200);
        });
        conn.on('close',function(){if(G&&!G.over)showNotif('ROZŁĄCZONO','#cc4444');});
      });
      OL.peer.on('error',function(e){olStat('Błąd: '+e.type+'. Odśwież stronę.','#cc4444');});
    }catch(e){olStat('Błąd PeerJS: '+e,'#cc4444');}
  });
}

/* ── GUEST joins room ── */
function olJoin(){
  var name=($id('ol-nm')&&$id('ol-nm').value.trim())||'Gracz';
  var code=($id('ol-code')&&$id('ol-code').value.trim())||'';
  if(!code){olStat('Wklej kod pokoju!','#cc4444');return;}
  OL.name=name;OL.isHost=false;OL.pIdx=1;OL.code=code;
  olShowLobby(code,false,name);
  olStat('Łączenie…','#88aaff');
  loadPeerJS(function(){
    try{
      OL.peer=new Peer(undefined,{debug:0});
      OL.peer.on('open',function(){
        OL.conn=OL.peer.connect(code,{reliable:true,serialization:'json'});
        OL.conn.on('open',function(){
          olStat('🟢 Połączono! Czekaj na start hosta…','#44ff88');
          // Send hi immediately and also retry every 2s until host acks
          olSend({t:'hi',name:name});
          OL._hiRetry=setInterval(function(){
            if(OL._hiAcked){clearInterval(OL._hiRetry);return;}
            olSend({t:'hi',name:name});
          },2000);
        });
        OL.conn.on('data',function(d){olRecv(d);});
        OL.conn.on('close',function(){if(G&&!G.over)showNotif('HOST ROZŁĄCZYŁ SIĘ','#cc4444');});
        OL.conn.on('error',function(){olStat('Błąd połączenia','#cc4444');});
      });
      OL.peer.on('error',function(e){
        olStat('Nie można połączyć ('+e.type+')<br>Sprawdź kod i internet','#cc4444');
      });
    }catch(e){olStat('Błąd: '+e,'#cc4444');}
  });
}

function olSend(msg){
  if(OL.conn&&OL.conn.open){
    try{OL.conn.send(msg);}catch(e){dbg('SEND ERR: '+e);}
  } else {
    dbg('SEND FAIL: conn='+(OL.conn?'exists':'null')+' open='+(OL.conn?OL.conn.open:'N/A'));
  }
}

/* ── HOST pushes full state to guest after every change ── */
function olPush(){
  if(!OL.isHost||!G)return;
  dbg('olPush | cur='+G.cur+' p0hand='+G.players[0].hand.length+' p1hand='+(G.players[1]?G.players[1].hand.length:0));
  olSend({t:'state', s:{
    pl:G.players.map(function(p){return{
      name:p.name,hand:p.hand.map(function(c){return{id:c.id,name:c.name,art:c.art,type:c.type,power:!!c.power,uid:c.uid};}),
      alive:p.alive,char:p.char||'ghost'
    };}),
    dk:G.deck.length,  // just count for display
    dc:G.discard,
    cur:G.cur,
    phase:G.phase,
    over:G.over,
    dir:G.direction,
    dkArr:G.deck.map(function(c){return{id:c.id,name:c.name,art:c.art,type:c.type,power:!!c.power,uid:c.uid};}),
    dp:G.discardPile.length>0?{id:G.discardPile[G.discardPile.length-1].id,name:G.discardPile[G.discardPile.length-1].name,art:G.discardPile[G.discardPile.length-1].art,type:G.discardPile[G.discardPile.length-1].type,power:false}:null,
    drawsLeft:G.drawsLeft,
    newCardIdx:G.newCardIdx,
    selCard:G.selectedCard,
    lastPow:G.lastPow?{id:G.lastPow.id,name:G.lastPow.name}:null
  }});
}

/* ── incoming data ── */
function olRecv(d){
  if(!d||!d.t)return;
  dbg('olRecv t='+d.t+' isHost='+OL.isHost);

  /* Ping/pong to verify connection */
  if(d.t==='ping'&&!OL.isHost){
    olSend({t:'hi',name:OL.name}); // re-send hi in case it was missed
    return;
  }

  /* Host receives guest's hi message */
  if(d.t==='hi'&&OL.isHost){
    OL.guestName=d.name;
    var rp=$id('ol-players');
    if(rp)rp.innerHTML=
      '<div style="color:#44ff88;font-family:Cinzel,serif;font-size:12px">● '+OL.name+' (Ty)</div>'+
      '<div style="color:#f5c842;font-family:Cinzel,serif;font-size:12px">● '+d.name+'</div>';
    olStat('🟢 '+d.name+' dołączył!','#44ff88');
    var sb=$id('ol-startbtn');if(sb)sb.style.display='block';
    olSend({t:'ok',host:OL.name,guest:d.name});
    return;
  }

  /* Guest receives confirmation */
  if(d.t==='ok'&&!OL.isHost){
    OL._hiAcked=true; // stop retrying hi
    if(OL._hiRetry){clearInterval(OL._hiRetry);}
    var rp=$id('ol-players');
    if(rp)rp.innerHTML=
      '<div style="color:#f5c842;font-family:Cinzel,serif;font-size:12px">● '+d.host+' (host)</div>'+
      '<div style="color:#44ff88;font-family:Cinzel,serif;font-size:12px">● '+d.guest+' (Ty)</div>';
    olStat('✅ Połączono! Czekaj na start hosta…','#44ff88');
    return;
  }

  /* Guest receives full state from host */
  if(d.t==='state'&&!OL.isHost){
    olApplyState(d.s);
    return;
  }

  /* Host receives action from guest */
  if(d.t==='act'&&OL.isHost){
    olDoGuestAction(d.a);
    return;
  }
}

/* ── Guest applies state received from host ── */
function olApplyState(s){
  if(!G||!s)return;
  dbg('olApplyState | cur='+s.cur+' phase='+s.phase+' p0h='+(s.pl&&s.pl[0]?s.pl[0].hand.length:'?')+' p1h='+(s.pl&&s.pl[1]?s.pl[1].hand.length:'?')+' myPIdx='+OL.pIdx);
  // Update players (hands, alive)
  if(s.pl){
    for(var i=0;i<s.pl.length&&i<G.players.length;i++){
      G.players[i].hand=s.pl[i].hand||[];
      G.players[i].alive=s.pl[i].alive;
    }
  }
  if(s.dkArr)G.deck=s.dkArr;
  G.discard=s.dc||0;
  if(s.dp)G.discardPile=[s.dp]; else if(G.discardPile.length)G.discardPile=G.discardPile.slice(-1);
  G.cur=s.cur;
  G.phase=s.phase;
  G.over=s.over;
  G.direction=s.dir||1;
  G.drawsLeft=s.drawsLeft||3;
  G.newCardIdx=s.newCardIdx!=null?s.newCardIdx:-1;
  G.selectedCard=s.selCard!=null?s.selCard:-1;
  G.lastPow=s.lastPow||null;
  G.locked=false;
  if(G.over){
    $id('win-ov').style.display='flex';
    var alive=G.players.filter(function(p){return p.alive;});
    var wn=$id('win-name');if(wn)wn.textContent=alive[0]?alive[0].name:'NIKT';
  }
  render();
}

/* ── Guest sends action to host ── */
function olAct(a){
  if(G&&G.onlineMode&&!OL.isHost)olSend({t:'act',a:a});
}

/* ── Host executes guest's action ── */
function olDoGuestAction(a){
  if(!OL.isHost||!G)return;
  dbg('olDoGuestAction a='+a.t+' cur='+G.cur+' phase='+G.phase);
  if(G.cur!==1){dbg('NOT GUEST TURN cur='+G.cur);olPush();return;}
  var cur=G.players[1];
  if(!cur||!cur.alive){dbg('GUEST NOT ALIVE');return;}

  if(a.t==='draw'){
    if(G.phase!=='draw'||G.drawsLeft<=0||G.deck.length===0){olPush();return;}
    G.locked=true;
    doDrawCard(function(){G.locked=false;olPush();});
  }
  else if(a.t==='end'){
    if(G.drawsLeft===3&&!G.playedCardThisTurn){olPush();return;}
    G.selectedCard=-1;G.newCardIdx=-1;
    if(G.phase==='hand-play')G.phase='draw';
    nextTurn();olPush();
  }
  else if(a.t==='sel'){
    G.selectedCard=a.i;
    if(G.phase==='draw'&&a.i>=0&&a.i!==G.newCardIdx){
      var c=cur.hand[a.i];
      if(c&&c.id!=='angel')G.phase='hand-play';
    }
    olPush();
  }
  else if(a.t==='play'){
    var idx=a.i;
    if(idx<0||idx>=cur.hand.length){olPush();return;}
    var c=cur.hand[idx];
    if(!c||c.id==='angel'){olPush();return;}
    G.locked=true;
    cur.hand.splice(idx,1);
    if(G.newCardIdx>idx)G.newCardIdx--;
    G.selectedCard=-1;pushDiscard(c);
    if(c.power){
      executePower(c,cur,function(){G.locked=false;olPush();});
    }else{
      G.playedCardThisTurn=true;
      G.phase='draw';G.newCardIdx=-1;
      nextTurn();olPush();G.locked=false;
    }
  }
  else if(a.t==='angel'){
    var hc={id:'hitman',name:'HITMAN',art:'🔫',type:'hit',power:false,uid:'hitman_ret'};
    G.deck.splice(a.pos,0,hc);
    G.lastPow={id:'angel',name:'ANIOŁ'};G.phase='draw';G.newCardIdx=-1;
    $id('hitman-ov').style.display='none';$id('angel-ov').style.display='none';
    showNotif('😇 ANIOŁ RATUJE!','#ffff66');nextTurn();olPush();
  }
  else if(a.t==='die'){
    cur.alive=false;G.phase='draw';G.lastPow=null;
    $id('hitman-ov').style.display='none';
    showNotif('💀 WYELIMINOWANY!','#ff2222');
    if(!checkWin())nextTurn();olPush();
  }
}

/* ── HOST starts game ── */
function olStartGame(){
  if(!OL.isHost)return;
  var gName=OL.guestName||'Gracz';
  var hName=OL.name;
  CFG.hitman=1;
  var safe=20,b=Math.floor(safe/4),r=safe%4;
  CFG.s1=b+(r>0?1:0);CFG.s2=b+(r>1?1:0);CFG.s3=b+(r>2?1:0);CFG.s4=b;
  CFG.shuffle=3;CFG.fake=2;CFG.angel=3;CFG.steal=2;CFG.give=2;CFG.cancel=2;
  CFG.peek=2;CFG.chain=1;CFG.addhit=1;CFG.reverse=2;CFG.copy=1;CFG.purge=1;CFG.double=1;CFG.bottom=2;
  var deck=buildDeck();
  // Tell guest to init their side
  olSend({t:'init',hName:hName,gName:gName,
    deck:deck.map(function(c){return{id:c.id,name:c.name,art:c.art,type:c.type,power:!!c.power,uid:c.uid};})
  });
  // Init host side
  G=olMakeGame(hName,gName,deck);
  OL.pIdx=0;
  // Hide ALL overlays to ensure game is visible
  ['menu-ov','setup-ov','online-ov','win-ov','hitman-ov','angel-ov','picker-ov'].forEach(function(id){
    var el=$id(id);if(el)el.style.display='none';
  });
  $id('exit-btn').style.display='block';
  var jm=$id('jazz-man');if(jm)jm.style.display='block';
  render();
  setTimeout(olPush,500);
}

// Also handle init on guest side (inside olRecv)
var _olRecvOrig=null;
(function(){
  var _orig=olRecv;
  olRecv=function(d){
    if(d&&d.t==='init'&&!OL.isHost){
      G=olMakeGame(d.hName,d.gName,d.deck);
      OL.pIdx=1;
      // Hide ALL overlays
      ['menu-ov','setup-ov','online-ov','win-ov','hitman-ov','angel-ov','picker-ov'].forEach(function(id){
        var el=$id(id);if(el)el.style.display='none';
      });
      $id('exit-btn').style.display='block';
      var jm=$id('jazz-man');if(jm)jm.style.display='block';
      render();
      return;
    }
    _orig(d);
  };
})();

function olMakeGame(hName,gName,deck){
  return{
    players:[
      {name:hName,isBot:false,hand:[],alive:true,char:cfgVals._playerChar||'ghost',personality:'human'},
      {name:gName,isBot:false,hand:[],alive:true,char:'wolf',personality:'human'},
    ],
    deck:deck,discardPile:[],discard:0,cur:0,lastPow:null,over:false,
    phase:'draw',locked:false,selectedCard:-1,drawsLeft:3,newCardIdx:-1,
    playedCardThisTurn:false,direction:1,chainedCard:null,chainTurnsLeft:0,
    doubleTarget:-1,doublingTurn:false,onlineMode:true
  };
}

/* ── Lobby UI ── */
function olShowLobby(code,isHost,myName){
  $id('online-ov').style.display='flex';
  $id('online-content').innerHTML=
    '<div class="slbl" style="font-size:10px">'+(isHost?'TWÓJ KOD — SKOPIUJ I WYŚLIJ':'ŁĄCZENIE')+'</div>'+
    '<div id="ol-cbox" onclick="olCopy()" style="'+
      'font-size:clamp(8px,1.5vw,10px);word-break:break-all;color:#f5c842;'+
      'padding:8px;border:1px solid var(--gold);border-radius:6px;'+
      'background:#1a0e0488;text-align:center;cursor:pointer;max-width:min(320px,88vw);line-height:1.5">'+
      code+'<br><span style="font-size:8px;color:#7a5a2a">kliknij aby skopiować</span>'+
    '</div>'+
    '<div id="ol-players" style="font-family:Cinzel,serif;font-size:12px;display:flex;flex-direction:column;gap:3px;text-align:center">'+
      '<div style="color:'+(isHost?'#44ff88':'#f5c842')+'">● '+myName+(isHost?' (Ty)':' (Ty — gość)')+'</div>'+
    '</div>'+
    '<div id="ol-stat" style="font-size:12px;color:#c8a060;text-align:center;min-height:24px;font-family:IM Fell English,serif;line-height:1.5"></div>'+
    (isHost?'<button id="ol-startbtn" class="mbtn pri" style="width:100%;display:none" onclick="olStartGame()">▶ Rozpocznij grę</button>':'');
}

function olCopy(){
  if(!OL.code)return;
  try{navigator.clipboard.writeText(OL.code).then(function(){olStat('✓ Skopiowano!','#44ff88');});}
  catch(e){
    // Fallback for mobile
    var ta=document.createElement('textarea');ta.value=OL.code;
    ta.style.cssText='position:fixed;top:0;left:0;opacity:0.01';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');olStat('✓ Skopiowano!','#44ff88');}catch(e2){olStat('Skopiuj kod ręcznie','#888');}
    document.body.removeChild(ta);
  }
}

showMenu();
</script>
