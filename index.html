<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HITMAN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body,html{width:100%;height:100%;overflow:hidden;background:#0c0704;font-family:'Cinzel',serif;color:#e8d0a0;touch-action:manipulation}
:root{--gold:#d4a017;--gold2:#f5c842;--red:#9a1515;--green:#1a5c1a;--wood:#5a2e08;--wood2:#7a4010;--shadow:#00000099;}
#app{width:100%;height:100dvh;min-height:520px;position:relative;overflow:hidden}
#room-bg{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 110% 60% at 50% -5%,#3d2010 0%,#1a0c06 50%,#0c0602 100%);}
#wall{position:absolute;top:0;left:0;right:0;height:46%;z-index:1;background-color:#2e1508;background-image:repeating-linear-gradient(0deg,transparent 0px,transparent 18px,rgba(0,0,0,.55) 18px,rgba(0,0,0,.55) 20px),repeating-linear-gradient(90deg,transparent 0px,transparent 38px,rgba(0,0,0,.4) 38px,rgba(0,0,0,.4) 40px);mask-image:linear-gradient(to bottom,black 50%,transparent 100%);-webkit-mask-image:linear-gradient(to bottom,black 50%,transparent 100%);box-shadow:inset 0 -30px 50px #0c060288;}
#wall-lamp{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:2;width:clamp(120px,22vw,200px);height:clamp(60px,12vh,100px);background:radial-gradient(ellipse 80% 100% at 50% 0%,#f5c84222 0%,transparent 70%);pointer-events:none;}
#wainscot{position:absolute;top:44%;left:0;right:0;z-index:2;height:clamp(18px,3.5vh,28px);background:linear-gradient(180deg,#1a0904 0%,#3a1a08 15%,#5a3010 40%,#6a3a14 50%,#5a3010 60%,#3a1a08 85%,#1a0904 100%);box-shadow:0 4px 20px #00000088,inset 0 1px 0 #c8921a55;}
#floor{position:absolute;bottom:0;left:0;right:0;z-index:1;height:57%;background:repeating-linear-gradient(90deg,#180b04 0px,#180b04 1px,transparent 1px,transparent 58px),linear-gradient(0deg,#2a1408 0%,#100804 100%);opacity:.88;}
#ambient{position:absolute;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 50% 46%,rgba(245,200,66,.06) 0%,transparent 70%),linear-gradient(90deg,rgba(0,0,0,.4) 0%,transparent 15%,transparent 85%,rgba(0,0,0,.4) 100%);}
#table-wrap{position:absolute;left:50%;bottom:clamp(78px,15vh,120px);transform:translateX(-50%);width:min(600px,95vw);height:min(230px,30vw);z-index:5;}
#table-outer{width:100%;height:100%;border-radius:50%;background:radial-gradient(ellipse 70% 50% at 50% 30%,#8a5020 0%,#5a2e08 50%,#3a1a04 100%);padding:11px;box-shadow:0 30px 80px #00000099,inset 0 3px 0 #c8921a55,inset 0 -3px 8px #00000099;overflow:hidden;}
#table-felt{width:100%;height:100%;border-radius:50%;background:radial-gradient(ellipse 85% 75% at 42% 30%,#2a8030 0%,#1d6625 30%,#0f4015 65%,#082c0c 100%);position:relative;box-shadow:inset 0 8px 28px #00000088,inset 0 0 90px #00000055;}
#piles{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:clamp(18px,4vw,32px)}
.pile-wrap{display:flex;flex-direction:column;align-items:center;position:relative}
.pile-lbl{position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:clamp(8px,1.6vw,10px);color:#5a7a3a;letter-spacing:2px;white-space:nowrap;text-shadow:0 1px 3px #000;}
#deck-stack{width:clamp(52px,8.5vw,66px);height:clamp(76px,13vw,96px);cursor:pointer;position:relative;transition:transform .12s;flex-shrink:0;}
#deck-stack:active{transform:scale(1.07)}
.dk{position:absolute;width:100%;height:100%;border-radius:6px;background:linear-gradient(160deg,#2d1506 0%,#1a0c04 50%,#2d1506 100%);border:1.5px solid #8a4a0e;box-shadow:2px 2px 6px #00000088;}
.dk::before{content:'';position:absolute;inset:5px;border-radius:4px;border:1px solid #6a3a0a44;}
.dk::after{content:'✦';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(14px,2.5vw,18px);color:#5a2a0844;}
.dk:nth-child(1){top:5px;left:3px}.dk:nth-child(2){top:3px;left:1.5px}.dk:nth-child(3){top:0;left:0}
#deck-ct{position:absolute;top:-11px;right:-11px;background:linear-gradient(135deg,#d4a017,#f5c842);color:#1a0800;font-family:'Cinzel',serif;font-size:10px;font-weight:700;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 8px #d4a01799,0 2px 4px #000;}
#discard-pile{width:clamp(52px,8.5vw,66px);height:clamp(76px,13vw,96px);position:relative;flex-shrink:0;border-radius:6px;border:1.5px dashed #3a2a1044;display:flex;align-items:center;justify-content:center;}
#dis-top{width:100%;height:100%;position:absolute;inset:0;border-radius:5px;overflow:hidden}
#dis-ct{position:absolute;top:-11px;right:-11px;background:#2a1206;border:1px solid #6a3a0e;font-family:'Cinzel',serif;font-size:10px;color:var(--gold2);border-radius:50%;width:24px;height:24px;align-items:center;justify-content:center;display:none;box-shadow:0 2px 4px #000;}
#header{position:absolute;top:5px;left:0;right:0;text-align:center;z-index:10;font-family:'Cinzel Decorative',serif;letter-spacing:4px;pointer-events:none;font-size:clamp(16px,3.8vw,32px);font-weight:700;}
.h-your{color:#ff6200;text-shadow:0 0 12px #ff620099,0 2px 4px #000}
.h-name{color:var(--gold2);text-shadow:0 0 12px #f5c84299,0 2px 4px #000}
.h-turn{color:#cc1a1a;text-shadow:0 0 12px #cc1a1a99,0 2px 4px #000}
.h-wait{color:#4a3a28;font-family:'Cinzel',serif;font-size:clamp(11px,2.6vw,19px);letter-spacing:2px}
#info-row{position:absolute;top:clamp(36px,6vh,50px);left:0;right:0;display:flex;justify-content:center;gap:clamp(10px,3vw,24px);z-index:10;pointer-events:none;}
.ir{text-align:center;padding:2px 8px;background:#0c070488;border:1px solid #2a1a0844;border-radius:4px}
.ir-v{font-size:clamp(12px,2.8vw,18px);display:block;font-weight:700;font-family:'Cinzel',serif}
.ir-l{font-size:clamp(6px,1.3vw,8px);color:#6a4a24;letter-spacing:1px;text-transform:uppercase}
.c-r{color:#ff5555;text-shadow:0 0 8px #ff555566,0 1px 2px #000}
.c-p{color:#cc88ff;text-shadow:0 0 8px #cc88ff66,0 1px 2px #000}
.c-g{color:#55ee99;text-shadow:0 0 8px #55ee9966,0 1px 2px #000}
#stats{position:absolute;left:4px;top:clamp(50px,8vh,64px);width:clamp(66px,13vw,92px);z-index:10}
.sbox{background:linear-gradient(160deg,#1a0d0499,#0c070499);border:1px solid #3a200855;border-radius:4px;padding:4px 7px;margin-bottom:4px;box-shadow:0 2px 8px #00000055;}
.sl{font-size:clamp(6px,1.2vw,8px);letter-spacing:2px;color:#5a3a18;margin-bottom:1px;font-family:'Cinzel',serif}
.sv{font-size:clamp(11px,2.5vw,15px);font-family:'Cinzel',serif}
.opp{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;z-index:6}
.opp-frame{width:clamp(44px,7.5vw,60px);height:clamp(44px,7.5vw,60px);border-radius:6px;border:2px solid #4a2a10;background:linear-gradient(160deg,#1a0e06,#0c0804);position:relative;overflow:hidden;flex-shrink:0;box-shadow:0 4px 12px #00000088;transition:border-color .3s,box-shadow .3s;}
.opp-frame.act{border-color:var(--gold2);box-shadow:0 0 16px #f5c84288,0 4px 12px #000}
.opp-frame.dead{filter:grayscale(1) brightness(.4)}
.opp-frame svg{width:100%;height:100%}
.oname{font-family:'Cinzel',serif;font-size:clamp(7px,1.5vw,9px);color:#c8a060;letter-spacing:1px;white-space:nowrap;text-shadow:0 1px 3px #000;}
.opp-hand-fan{position:relative;height:clamp(34px,6.5vw,50px);width:clamp(54px,10vw,80px);flex-shrink:0;}
.fan-card{position:absolute;width:clamp(22px,4vw,30px);height:clamp(34px,6.5vw,50px);border-radius:4px;background:linear-gradient(160deg,#2d1506 0%,#1a0c04 50%,#2d1506 100%);border:1.5px solid #8a4a0e;box-shadow:1px 2px 6px #000000aa;transform-origin:bottom center;left:50%;margin-left:clamp(-11px,-2vw,-15px);overflow:hidden;}
.fan-card .fc-diamond{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(45deg);width:clamp(8px,1.5vw,12px);height:clamp(8px,1.5vw,12px);border:1px solid #8a4a0a33;background:radial-gradient(circle,#c8921a18,transparent 70%);}

/* ACTION ZONE — overflow:visible so cards lift above the zone border */
#action-zone{position:absolute;bottom:0;left:0;right:0;z-index:20;display:flex;flex-direction:column;align-items:center;padding-bottom:clamp(4px,1.5vh,10px);gap:clamp(3px,.8vh,6px);overflow:visible;}
#btn-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;padding:0 8px;position:relative;z-index:21;}

/* HAND CARDS — wrap handles x-scroll, inner div handles y-overflow */
#hand-cards-wrap{width:100%;max-width:100vw;overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;padding-top:40px;margin-top:-40px;}
#hand-cards-wrap::-webkit-scrollbar{height:3px;background:#0c0704}
#hand-cards-wrap::-webkit-scrollbar-thumb{background:#5a3010;border-radius:2px}
#hand-cards{display:flex;align-items:flex-end;justify-content:center;flex-wrap:nowrap;padding:0 8px 4px;min-width:max-content;margin:0 auto;overflow:visible;}

.hcard{width:clamp(56px,9.5vw,72px);height:clamp(83px,14vw,108px);border-radius:8px;margin:0 4px;flex-shrink:0;cursor:pointer;position:relative;transition:transform .18s cubic-bezier(.2,.8,.3,1.2),box-shadow .18s;-webkit-user-select:none;user-select:none;}
.hcard.selected{transform:translateY(-30px) scale(1.09)!important;z-index:35}
@media(hover:hover){.hcard:hover{transform:translateY(-22px) scale(1.07);z-index:30;}}
.hcard:active{transform:translateY(-12px) scale(1.04);z-index:30}

.card-face{width:100%;height:100%;border-radius:8px;position:relative;overflow:hidden;box-shadow:2px 4px 12px #00000099,inset 0 1px 0 #ffffff33;}
.c-base{position:absolute;inset:0;}
.c-border{position:absolute;inset:3px;border-radius:5px;border:1.5px solid;}
.c-inner{position:absolute;inset:6px;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.c-art{font-size:clamp(22px,4vw,30px);line-height:1;filter:drop-shadow(0 1px 2px #0004)}
.c-name{font-family:'Cinzel',serif;font-size:clamp(5.5px,1vw,7.5px);letter-spacing:.5px;text-align:center;line-height:1.2;font-weight:700;}
.c-tl{position:absolute;top:4px;left:5px;font-size:clamp(5px,.9vw,7px);font-family:'Cinzel',serif;line-height:1}
.c-br{position:absolute;bottom:4px;right:5px;font-size:clamp(5px,.9vw,7px);font-family:'Cinzel',serif;line-height:1;transform:rotate(180deg)}
.t-hit .c-base{background:linear-gradient(160deg,#f0d0d0,#e8c0c0,#f0d0d0)}.t-hit .c-border{border-color:#8a1515;box-shadow:inset 0 0 8px #ff000022}.t-hit .c-name,.t-hit .c-tl,.t-hit .c-br{color:#7a0000}
.t-safe .c-base{background:linear-gradient(160deg,#d0e8d0,#c0d8c0,#d0e8d0)}.t-safe .c-border{border-color:#1a5a1a}.t-safe .c-name,.t-safe .c-tl,.t-safe .c-br{color:#0a3a0a}
.t-pow .c-base{background:linear-gradient(160deg,#e8dfc0,#ddd0a8,#e8dfc0)}.t-pow .c-border{border-color:#8a6010;box-shadow:inset 0 0 6px #d4a01722}.t-pow .c-name,.t-pow .c-tl,.t-pow .c-br{color:#5a3a08}
.p-badge{position:absolute;top:-5px;right:-5px;z-index:5;background:linear-gradient(135deg,#d4a017,#f5c842);color:#1a0800;font-family:'Cinzel',serif;font-size:6px;font-weight:700;border-radius:8px;padding:1px 4px;letter-spacing:.3px;box-shadow:0 0 6px #d4a01799,0 1px 3px #000;}
.n-badge{position:absolute;top:-5px;left:-5px;z-index:5;background:linear-gradient(135deg,#1a3a6a,#2a5a9a);color:#aaccff;font-family:'Cinzel',serif;font-size:6px;border-radius:8px;padding:1px 4px;box-shadow:0 1px 3px #000;}
/* CARD INFO PANEL — fixed bottom panel, never clipped anywhere */
#card-info-panel{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:9998;
  background:linear-gradient(0deg,#0e0804ff 0%,#1a0e06ee 70%,transparent 100%);
  padding:10px 16px 14px;
  pointer-events:none;
  opacity:0;
  transform:translateY(8px);
  transition:opacity .2s,transform .2s;
  display:flex;
  align-items:center;
  gap:12px;
}
#card-info-panel.visible{
  opacity:1;
  transform:translateY(0);
}
#card-info-panel .cip-art{font-size:28px;flex-shrink:0;filter:drop-shadow(0 2px 4px #000);}
#card-info-panel .cip-body{flex:1;min-width:0;}
#card-info-panel .cip-name{font-family:'Cinzel',serif;font-size:clamp(10px,2.5vw,13px);font-weight:700;letter-spacing:1px;margin-bottom:2px;}
#card-info-panel .cip-desc{font-family:'IM Fell English',serif;font-size:clamp(10px,2.2vw,12px);color:#c8a870;line-height:1.4;font-style:italic;}
#card-info-panel .cip-type{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;color:#5a4020;margin-top:3px;}
.abtn{font-family:'Cinzel',serif;font-size:clamp(10px,2.2vw,13px);letter-spacing:1.5px;padding:clamp(6px,1.3vh,9px) clamp(10px,3vw,18px);border-radius:4px;cursor:pointer;border:1px solid;background:transparent;transition:all .15s;-webkit-user-select:none;user-select:none;touch-action:manipulation;text-shadow:0 1px 2px #000;}
.abtn:active{transform:scale(.95)}
.btn-gold{color:var(--gold2);border-color:var(--gold);background:linear-gradient(160deg,#2a1a0488,#1a0e0488);font-size:clamp(11px,2.8vw,15px);padding:clamp(8px,1.8vh,11px) clamp(16px,4.5vw,26px);box-shadow:0 0 12px #d4a01733,0 2px 6px #000;}
.btn-green{color:#55ee99;border-color:#2a7a44;background:#0a1a0e88;box-shadow:0 2px 6px #000}
.btn-red{color:#ff7777;border-color:#7a2222;background:#1a0a0a88;box-shadow:0 2px 6px #000}
.btn-gray{color:#888;border-color:#3a3020;background:#1a140888;box-shadow:0 2px 6px #000}
.btn-play{color:#ffdd66;border-color:#aa7a00;background:linear-gradient(160deg,#1a130088,#0e0c0088);box-shadow:0 0 10px #aa7a0044,0 2px 6px #000;}
.phase-lbl{font-family:'Cinzel',serif;font-size:clamp(8px,1.8vw,11px);color:#7a5a2a;letter-spacing:1.5px;text-align:center;text-shadow:0 1px 2px #000;}
.modal-bg{position:absolute;inset:0;z-index:55;background:radial-gradient(ellipse at 50% 40%,#1a0e0688 0%,#00000099 100%);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:clamp(18px,4.5vw,32px);font-weight:700;letter-spacing:3px;text-align:center;text-shadow:0 0 20px currentColor,0 2px 6px #000;}
.modal-sub{font-family:'IM Fell English',serif;font-size:clamp(11px,2.5vw,14px);color:#9a7a4a;letter-spacing:1px;text-align:center;font-style:italic;text-shadow:0 1px 3px #000;}
.place-btns{display:flex;flex-direction:column;gap:8px;width:min(280px,80vw)}
.place-btn{font-family:'Cinzel',serif;font-size:clamp(11px,2.5vw,13px);letter-spacing:1px;padding:10px 16px;border:1px solid var(--wood2);border-radius:5px;cursor:pointer;background:linear-gradient(160deg,#2a1a0888,#1a0e0488);color:var(--gold2);transition:all .15s;text-align:left;box-shadow:0 2px 8px #000;}
.place-btn:hover,.place-btn:active{background:linear-gradient(160deg,#3a2a1088,#2a1a0888);border-color:var(--gold)}
#picker-ov .modal-title{color:var(--gold2)}
#picker-list{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:0 12px}
.picker-btn{font-family:'Cinzel',serif;font-size:clamp(10px,2.2vw,13px);letter-spacing:1px;padding:10px 16px;border:1px solid var(--gold);border-radius:6px;cursor:pointer;background:linear-gradient(160deg,#2a1a0888,#1a0e0488);color:var(--gold2);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:76px;box-shadow:0 4px 12px #000;}
.picker-btn:hover,.picker-btn:active{background:linear-gradient(160deg,#3a2a1088,#2a1a0488)}
.picker-portrait{width:50px;height:50px;border-radius:5px;overflow:hidden;border:1px solid #5a3010;box-shadow:0 2px 6px #000}
.picker-portrait svg{width:100%;height:100%}
#notif{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);z-index:60;pointer-events:none;font-family:'Cinzel Decorative',serif;font-weight:700;font-size:clamp(20px,5vw,40px);letter-spacing:4px;text-align:center;opacity:0;transition:opacity .25s;text-shadow:0 0 24px currentColor,0 2px 6px #000;white-space:nowrap;}
.full-overlay{position:absolute;inset:0;z-index:80;background:radial-gradient(ellipse 90% 60% at 50% 20%,#2a1208 0%,#0a0502 70%),#0a0502;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:clamp(6px,1.5vh,12px);padding:20px;overflow-y:auto;}
.menu-title{font-family:'Cinzel Decorative',serif;font-size:clamp(30px,8vw,58px);font-weight:700;color:var(--gold2);text-shadow:0 0 26px #f5c842aa,0 3px 8px #000;letter-spacing:6px;margin-bottom:2px;}
.menu-sub{font-family:'IM Fell English',serif;font-size:clamp(10px,2.2vw,13px);color:#5a4018;letter-spacing:3px;margin-bottom:8px;font-style:italic;}
.mbtn{font-family:'Cinzel',serif;font-size:clamp(12px,2.8vw,15px);letter-spacing:2px;padding:clamp(10px,2vh,13px) clamp(20px,5.5vw,40px);border:1px solid;cursor:pointer;border-radius:5px;background:transparent;width:min(280px,82vw);text-align:center;transition:all .2s;touch-action:manipulation;text-shadow:0 1px 3px #000;box-shadow:0 3px 10px #000;}
.mbtn.pri{color:var(--gold2);border-color:var(--gold);background:linear-gradient(160deg,#2a1a0499,#1a0e0499);}
.mbtn.pri:hover,.mbtn.pri:active{background:linear-gradient(160deg,#3a2a0888,#2a1a0488)}
.mbtn.sec{color:#5a4a28;border-color:#3a2a14;background:#15100488}
.mbtn.sec:hover,.mbtn.sec:active{color:#8a7a48;border-color:#5a4a28}
.sinp{background:#15080488;border:1px solid #5a3010;color:#e8d0a0;font-family:'IM Fell English',serif;font-size:16px;padding:8px 14px;border-radius:4px;width:min(210px,70vw);outline:none;text-align:center;box-shadow:inset 0 2px 6px #000;}
.sinp:focus{border-color:var(--gold);box-shadow:inset 0 2px 6px #000,0 0 8px #d4a01755}
.slbl{font-family:'Cinzel',serif;font-size:clamp(8px,1.8vw,11px);letter-spacing:2px;color:#6a4a20;text-shadow:0 1px 2px #000;}
.divider{width:min(240px,70vw);height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:3px 0;box-shadow:0 0 8px var(--gold);}
.settings-grid{display:grid;grid-template-columns:auto auto;gap:6px 14px;width:min(360px,90vw);align-items:center;}
.sg-label{font-family:'IM Fell English',serif;font-size:clamp(10px,2.2vw,12px);color:#a08040;text-align:right;font-style:italic;}
.sg-ctrl{display:flex;align-items:center;gap:6px}
.num-btn{font-family:'Cinzel',serif;font-size:16px;width:28px;height:28px;border:1px solid #5a3010;background:#1a0e0488;color:var(--gold2);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;box-shadow:0 2px 4px #000;}
.num-btn:hover{background:#2a1a0888;border-color:var(--gold)}
.num-val{font-family:'Cinzel',serif;font-size:clamp(13px,2.8vw,16px);color:var(--gold2);min-width:26px;text-align:center;text-shadow:0 1px 2px #000;}
.total-lbl{font-family:'Cinzel',serif;font-size:clamp(9px,1.8vw,11px);color:#7a5a28;letter-spacing:2px;text-shadow:0 1px 2px #000;}
</style>
</head>
<body>
<div id="app">
  <div id="room-bg"></div>
  <div id="wall"><div id="wall-lamp"></div></div>
  <div id="wainscot"></div>
  <div id="floor"></div>
  <div id="ambient"></div>
  <div id="table-wrap">
    <div id="table-outer"><div id="table-felt">

function updateTotal(){

  CFG.hitman=cfgVals.hitman||1;

  CFG.s1=b+(r>0?1:0);CFG.s2=b+(r>1?1:0);CFG.s3=b+(r>2?1:0);CFG.s4=b;
  ['shuffle','fake','angel','steal','give','cancel','peek','chain','addhit','reverse','copy','purge','double','bottom'].forEach(function(k){CFG[k]=cfgVals[k]||0;});

function startGame(){
  applyConfig();
  var players=[];
  if(setupMode==='bot'){
    var nm=($id('p0n')&&$id('p0n').value.trim())||'Gracz';
    players.push({name:nm,isBot:false,hand:[],alive:true,char:cfgVals._playerChar||'ghost'});
    var nBots=Math.max(1,cfgVals._bots||3),pool=shuffleArr(BOT_POOL.slice());
    for(var i=0;i<Math.min(nBots,pool.length);i++)
      players.push({name:pool[i].name,isBot:true,hand:[],alive:true,char:pool[i].char,personality:['aggressive','cautious','bluffer'][i%3]});
    if(!cfgVals._hitmanManuallySet)CFG.hitman=players.length-1;
  } else {
    var n=Math.min(4,Math.max(2,cfgVals._players||2));
    for(var i=0;i<n;i++){var inp=$id('p'+i+'n');players.push({name:(inp&&inp.value.trim())||'Gracz '+(i+1),isBot:false,hand:[],alive:true,char:'ghost'});}
    if(!cfgVals._hitmanManuallySet)CFG.hitman=players.length-1;
  }
  G=makeGameState(players,buildDeck());
  $id('setup-ov').style.display='none';$id('exit-btn').style.display='block';
  render();if(isCurBot())setTimeout(botTurn,1500);
}

function makeGameState(players,deck){
  return{players:players,deck:deck,discardPile:[],discard:0,cur:0,lastPow:null,over:false,
    phase:'draw',locked:false,selectedCard:-1,drawsLeft:3,newCardIdx:-1,playedCardThisTurn:false,
    direction:1,chainedCard:null,chainTurnsLeft:0,doubleTarget:-1,doublingTurn:false,pendingPower:null};
}

/* ── RENDER ── */
function render(){
  if(!G)return;
  var hits=0;for(var i=0;i<G.deck.length;i++)if(G.deck[i].id==='hitman')hits++;
  var dpct=G.deck.length?Math.round(hits/G.deck.length*100):0;
  var alive=G.players.filter(function(p){return p.alive;}).length;
  $id('deck-ct').textContent=G.deck.length;$id('s-deck').textContent=G.deck.length;$id('s-dis').textContent=G.discard;
  $id('i-death').textContent=dpct+'%';$id('i-hit').textContent=hits;$id('i-ply').textContent=alive;
  var dt=$id('dis-top'),dc=$id('dis-ct'),topD=G.discardPile.length?G.discardPile[G.discardPile.length-1]:null;
  if(topD){dt.innerHTML=discardFaceHTML(topD);dt.parentElement.style.border='1.5px solid #5a3010';dc.style.display='flex';dc.textContent=G.discard;}
  else{dt.innerHTML=discardFaceHTML(null);dt.parentElement.style.border='1.5px dashed #3a1a0844';dc.style.display='none';}
  var h=$id('header'),cur=G.players[G.cur],mp=myPIdx(),isMyTurn=(G.cur===mp);
  if(!cur||cur.isBot)h.innerHTML='<span class="h-wait">'+(cur?cur.name.toUpperCase()+' myśli...':'HITMAN')+'</span>';
  else if(G.onlineMode&&!isMyTurn)h.innerHTML='<span class="h-wait">⏳ TURA: '+cur.name.toUpperCase()+'</span>';
  else if(G.phase==='hand-play')h.innerHTML='<span class="h-name">'+cur.name.toUpperCase()+'</span><span class="h-wait"> – zagraj kartę</span>';
  else h.innerHTML='<span class="h-your">YOUR </span><span class="h-name">'+cur.name.toUpperCase()+'</span><span class="h-turn"> TURN</span>';
  renderOpps();renderHandAndButtons();
}

function fanCardsHTML(n){
  if(n<=0)return'<div class="opp-hand-fan"></div>';
  var total=Math.min(n,10),spread=Math.min((total-1)*16,64),step=total>1?spread/(total-1):0,startAngle=-(spread/2);
  var html='<div class="opp-hand-fan">';
  for(var i=0;i<total;i++){
    var angle=startAngle+(i*step),tx=i*(Math.min(24/Math.max(total-1,1),18))-Math.min(n-1,9)*9;
    html+='<div class="fan-card" style="transform:translateX('+tx+'px) rotate('+angle+'deg)"><div class="fc-diamond"></div></div>';
  }
  return html+'</div>';
}

function renderOpps(){
  var cont=$id('opps');cont.innerHTML='';
  var pos=['left:50%;top:clamp(72px,11vh,92px);transform:translateX(-50%)','left:8%;top:clamp(106px,15.5vh,126px)','right:8%;top:clamp(106px,15.5vh,126px)'];
  var mp=myPIdx(),oi=[];
  for(var i=0;i<G.players.length;i++)if(i!==mp)oi.push(i);
  for(var idx=0;idx<Math.min(oi.length,3);idx++){
    var pi=oi[idx],p=G.players[pi],div=document.createElement('div');
    div.className='opp';div.style.cssText='position:absolute;'+pos[idx];
    div.innerHTML=fanCardsHTML(p.hand.length)+
      '<div class="opp-frame'+(pi===G.cur?' act':'')+(p.alive?'':' dead')+'">'+charSVG(p.char,60)+'</div>'+
      '<div class="oname">'+p.name+'</div>'+(!p.alive?'<div style="font-size:8px;color:#ff4444;font-family:Cinzel,serif;letter-spacing:1px">☠ WYELIM.</div>':'');
    cont.appendChild(div);

function renderHandAndButtons(){
  var hc=$id('hand-cards'),br=$id('btn-row');
  hc.innerHTML='';br.innerHTML='';if(!G||G.over)return;
  var mp=myPIdx(),isMyTurn=(G.cur===mp),hp=G.players[mp];
  if(hp&&hp.alive&&hp.hand.length>0){
    var html='';
    for(var i=0;i<hp.hand.length;i++)
      html+='<div style="display:inline-block" onclick="selectCard('+i+')">'+cardFaceHTML(hp.hand[i],G.selectedCard===i,i===G.newCardIdx)+'</div>';
    hc.innerHTML=html;
  }
  var cur=G.players[G.cur];if(!cur||!cur.alive)return;
  if(!isMyTurn){br.innerHTML='<span class="phase-lbl" style="color:#7a5a2a;letter-spacing:2px">⏳ Tura: '+cur.name.toUpperCase()+'</span>';return;}
  var curP=G.players[mp];
  if(G.phase==='draw'){
    var canDraw=G.drawsLeft>0&&G.deck.length>0;
    var myH=curP?curP.hand:[];var hasOld=false;
    for(var i=0;i<myH.length;i++)if(i!==G.newCardIdx&&myH[i].id!=='angel'){hasOld=true;break;}
    br.innerHTML=(canDraw?'<button class="abtn btn-gold" onclick="humanDraw()">📤 Dobierz kartę</button>':(!G.deck.length?'<span class="phase-lbl" style="color:#cc4444">Talia pusta!</span>':''))+
      (hasOld?'<span class="phase-lbl">lub zagraj z ręki</span>':'')+
      '<button class="abtn btn-green" onclick="endTurnEarly()">✓ Zakończ turę</button>';
  } else if(G.phase==='hand-play'){
    var myH2=curP?curP.hand:[],selC=(G.selectedCard>=0&&G.selectedCard!==G.newCardIdx)?myH2[G.selectedCard]:null,pb='';
    if(selC&&selC.id==='angel')pb='<span class="phase-lbl" style="color:#aaa">Anioł działa przy Hitmanie</span>';
    else if(G.selectedCard===G.newCardIdx)pb='<span class="phase-lbl" style="color:#cc4444">Nie możesz zagrać dobranej karty</span>';
    else if(selC)pb='<button class="abtn btn-play" onclick="playSelected()">▶ Zagraj: '+selC.name+'</button>';
    br.innerHTML='<span class="phase-lbl">Wybierz kartę lub zakończ</span>'+pb+'<button class="abtn btn-green" onclick="endHandPlay()">✓ Zakończ turę</button>';
  }
}

/* ── CARD ACTIONS ── */
function selectCard(idx){
  if(!G||G.over||G.locked)return;
  if(G.phase!=='draw'&&G.phase!=='hand-play')return;
  if(G.onlineMode&&G.cur!==myPIdx())return;
  G.selectedCard=(G.selectedCard===idx)?-1:idx;
  if(G.phase==='draw'&&G.selectedCard>=0&&G.selectedCard!==G.newCardIdx){
    var c=G.players[G.cur].hand[G.selectedCard];if(c&&c.id!=='angel')G.phase='hand-play';
  }
  renderHandAndButtons();
}
function playSelected(){
  if(!G||G.over||G.locked||G.selectedCard<0||G.selectedCard===G.newCardIdx)return;
  var cur=G.players[G.cur];if(!cur||!cur.alive)return;
  var c=cur.hand[G.selectedCard];if(!c||c.id==='angel')return;
  if(G.onlineMode&&!OL.isHost){olSend({t:'act',a:{t:'play',i:G.selectedCard}});return;}
  G.locked=true;cur.hand.splice(G.selectedCard,1);if(G.newCardIdx>G.selectedCard)G.newCardIdx--;
  G.selectedCard=-1;pushDiscard(c);
  if(c.power){executePower(c,cur,function(){G.locked=false;if(G.onlineMode)olPush();});}
  else{G.playedCardThisTurn=true;showNotif(c.art+' '+c.name,'#449944');G.phase='draw';G.newCardIdx=-1;nextTurn();G.locked=false;if(G.onlineMode)olPush();}
}
function endHandPlay(){
  if(!G||G.locked||G.phase!=='hand-play')return;
  if(G.onlineMode&&!OL.isHost){olSend({t:'act',a:{t:'end'}});return;}
  G.selectedCard=-1;G.phase='draw';G.newCardIdx=-1;nextTurn();if(G.onlineMode)olPush();
}
function endTurnEarly(){
  if(!G||G.locked||G.phase!=='draw')return;
  if(G.drawsLeft===3&&!G.playedCardThisTurn){showNotif('MUSISZ DOBRAĆ LUB ZAGRAĆ!','#cc4444');return;}
  if(G.onlineMode&&!OL.isHost){olSend({t:'act',a:{t:'end'}});return;}
  G.selectedCard=-1;G.newCardIdx=-1;nextTurn();if(G.onlineMode)olPush();
}
function humanDraw(){
  if(!G||G.over||G.locked||G.phase!=='draw'||G.drawsLeft<=0)return;
  if(G.deck.length===0){showNotif('TALIA PUSTA!','#cc4444');return;}
  if(G.onlineMode&&!OL.isHost){olSend({t:'act',a:{t:'draw'}});return;}
  G.locked=true;G.selectedCard=-1;
  doDrawCard(function(){G.locked=false;render();if(G.onlineMode)olPush();});
}

/* ── CORE DRAW ── */
function doDrawCard(cb){
  if(!G||G.over){if(cb)cb();return;}
  var cur=G.players[G.cur];
  if(!cur.alive){nextTurn();if(cb)cb();return;}
  if(G.deck.length===0){showNotif('TALIA PUSTA','#cc4444');G.phase='draw';render();if(cur.isBot){G.newCardIdx=-1;nextTurn();}if(cb)cb();return;}
  var card=G.deck.pop();

  if(card.id==='hitman'){
    pushDiscard(card);
    var aIdx=-1;for(var i=0;i<cur.hand.length;i++)if(cur.hand[i].id==='angel'){aIdx=i;break;}

    if(aIdx>=0&&cur.isBot){
      cur.hand.splice(aIdx,1);showNotif('😇 ANIOŁ!','#ffff66');
      G.lastPow={id:'angel',name:'ANIOŁ',art:'😇',type:'pow',power:true};G.phase='draw';
      G.deck.splice(rnd(0,G.deck.length),0,cardObjClean({id:'hitman',name:'HITMAN',art:'🔫',type:'hit',power:false,uid:'hitman_bot_'+Date.now()}));
      render();nextTurn();if(cb)cb();return;
    }

    if(aIdx>=0&&!cur.isBot){
      /* FIX: show hitman overlay — only the victim (G.cur) gets action buttons */
      G.phase='hitman-choice';
      showHitmanOverlay(cur,aIdx);
      render();if(cb)cb();
      if(G.onlineMode&&OL.isHost)olPush();
      return;
    }

    /* No angel — show overlay briefly then auto-eliminate */
    showHitmanOverlay(cur,-1);
    cur.alive=false;G.lastPow=null;G.phase='draw';
    showNotif('💀 HITMAN!','#ff2222');
    render();
    setTimeout(function(){
      $id('hitman-ov').style.display='none';
      if(!checkWin())nextTurn();
      if(G&&G.onlineMode)olPush();
    },1800);
    if(cb)cb();return;
  }

  G.drawsLeft--;
  cur.hand.push(card);G.newCardIdx=cur.hand.length-1;
  if(!cur.isBot){
    G.phase='draw';render();
    if(G.drawsLeft<=0)setTimeout(function(){G.newCardIdx=-1;nextTurn();if(G.onlineMode)olPush();},600);
    if(cb)cb();
  } else {
    G.phase='draw';botDecide(cur,function(){if(cb)cb();});
  }
}

/* ── HITMAN OVERLAY — only active player gets buttons ── */
function showHitmanOverlay(victimPlayer,aIdx){
  var mp=myPIdx(),isVictim=(G.cur===mp);
  $id('hitman-sub').textContent=isVictim
    ?(aIdx>=0?'Masz Anioła! Możesz go użyć.':'Zostałeś znaleziony...')
    :('💀 '+victimPlayer.name+' wylosował Hitmana!');
  $id('hitman-angel-btn').innerHTML=(isVictim&&aIdx>=0)
    ?'<button class="abtn btn-gold" onclick="useAngel('+aIdx+')">😇 Użyj Anioła</button>':'';
  $id('hitman-actions').innerHTML=aIdx<0

/* ── EXECUTE POWER ── */
function executePower(c,cur,cb){
  G.playedCardThisTurn=true;
  if(G.chainedCard&&G.chainedCard.id===c.id&&G.chainTurnsLeft>0){
    showNotif('⛓️ ZABLOKOWANE!','#cc8800');G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();return;
  }
  if(c.id==='shuffle'){G.deck=shuffleArr(G.deck);showNotif('🔀 TASOWANIE!','#8888ff');G.lastPow=cardObjClean(c);G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();return;}
  if(c.id==='fake'){showNotif('🎪 TASOWANIE?','#ffaa44');G.lastPow=cardObjClean(c);G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();return;}
  if(c.id==='cancel'){if(G.lastPow&&G.lastPow.id!=='hitman')showNotif('🚫 ANULACJA: '+G.lastPow.name,'#ffaa44');else showNotif('🚫 BRAK EFEKTU','#666');G.lastPow=null;G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();return;}
  if(c.id==='addhit'){G.deck.splice(rnd(0,G.deck.length),0,{id:'hitman',name:'HITMAN',art:'🔫',type:'hit',power:false,uid:'hitman_add_'+Date.now()});showNotif('💣 +1 HITMAN!','#ff4444');G.lastPow=cardObjClean(c);G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();return;}
  if(c.id==='reverse'){G.direction*=-1;showNotif('🔁 ODWRÓT KOLEJKI!',G.direction===1?'#88aaff':'#ffaa88');G.lastPow=cardObjClean(c);G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();return;}
  if(c.id==='chain'){if(G.lastPow&&G.lastPow.id!=='hitman'){G.chainedCard=G.lastPow;G.chainTurnsLeft=3;showNotif('⛓️ ŁAŃCUCH: '+G.lastPow.name+' ZABLOKOWANE!','#cc8800');}else showNotif('⛓️ ŁAŃCUCH – brak celu','#666');G.lastPow=cardObjClean(c);G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();return;}
  if(c.id==='bottom'){if(G.deck.length===0){showNotif('TALIA PUSTA','#cc4444');G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();return;}var bcard=G.deck.shift();G.drawsLeft--;cur.hand.push(bcard);G.newCardIdx=cur.hand.length-1;showNotif('⬇️ Z DOŁU: '+bcard.name,'#88aaff');G.lastPow=cardObjClean(c);G.phase='draw';render();if(G.drawsLeft<=0)setTimeout(function(){G.newCardIdx=-1;nextTurn();if(G.onlineMode)olPush();},600);if(cb)cb();return;}
  if(c.id==='copy'){if(G.lastPow&&G.lastPow.id!=='hitman'&&G.lastPow.power){showNotif('🪞 KOPIA: '+G.lastPow.name,'#cc88ff');var copied=G.lastPow;setTimeout(function(){executePower(copied,cur,cb);},300);}else{showNotif('🪞 KOPIA – brak mocy','#666');G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();}return;}

  /* Picker-based powers */
  if(c.id==='steal'||c.id==='give'){
    var tgts=getOthersAlive().filter(function(p){return p.hand.length>0;});
    if(!tgts.length){G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();return;}
    if(G.onlineMode&&G.cur===1){G.pendingPower={card:cardObjClean(c),type:'target',targets:tgts.map(function(p){return G.players.indexOf(p);}),cb:cb};G.phase='picking';olPush();return;}
    showPicker(c.id==='steal'?'🗃️ Ukradnij kartę od':'🤝 Wymusz kartę od',tgts,function(t){
      var s=t.hand.splice(rnd(0,t.hand.length-1),1)[0];cur.hand.push(s);
      showNotif(c.id==='steal'?'🗃️ KRADZIEŻ!':'🤝 WYMUSZENIE!',c.id==='steal'?'#88ccff':'#ff88aa');
      G.lastPow=cardObjClean(c);G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(G.onlineMode)olPush();if(cb)cb();
    });G.phase='picking';render();return;
  }
  if(c.id==='peek'){
    var top3=G.deck.slice(-3).reverse();G.lastPow=cardObjClean(c);
    if(G.onlineMode&&G.cur===1){G.pendingPower={card:cardObjClean(c),type:'peek',cards:top3.map(cardObjClean),cb:cb};G.phase='picking';olPush();return;}
    showPeekCards(top3,cur.isBot);G.phase='draw';G.newCardIdx=-1;render();
    if(cur.isBot){nextTurn();if(cb)cb();}return;
  }
  if(c.id==='purge'){
    var typesInDeck={};G.deck.forEach(function(dc){typesInDeck[dc.id]=dc.name;});
    var available=Object.keys(typesInDeck).map(function(t){return{name:typesInDeck[t],id:t};});
    if(!available.length){showNotif('🗑️ TALIA PUSTA','#666');G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();return;}
    if(G.onlineMode&&G.cur===1){G.pendingPower={card:cardObjClean(c),type:'type',types:available,cb:cb};G.phase='picking';olPush();return;}
    showTypePicker('🗑️ USUŃ RODZAJ KART',available,function(tid){
      var tname=typesInDeck[tid]||tid;G.deck=G.deck.filter(function(dc){return dc.id!==tid;});G.discardPile=G.discardPile.filter(function(dc){return dc.id!==tid;});
      showNotif('🗑️ USUNIĘTO: '+tname,'#ff8844');G.lastPow=cardObjClean(c);G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(G.onlineMode)olPush();if(cb)cb();
    });G.phase='picking';render();return;
  }
  if(c.id==='double'){
    var tgts=getOthersAlive();if(!tgts.length){G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(cb)cb();return;}
    if(G.onlineMode&&G.cur===1){G.pendingPower={card:cardObjClean(c),type:'target',targets:tgts.map(function(p){return G.players.indexOf(p);}),cb:cb};G.phase='picking';olPush();return;}
    showPicker('⏩ Kto gra 2 razy z rzędu?',tgts,function(t){
      G.doubleTarget=G.players.indexOf(t);G.doublingTurn=false;showNotif('⏩ '+t.name+' GRA 2 KOLEJKI!','#ffcc44');
      G.lastPow=cardObjClean(c);G.phase='draw';G.newCardIdx=-1;render();nextTurn();if(G.onlineMode)olPush();if(cb)cb();
    });G.phase='picking';render();return;
  }
  if(cb)cb();
}

/* ── RESOLVE PENDING POWER (online, after guest picker) ── */
function olResolvePendingPower(result){
  if(!G||!G.pendingPower)return;
  var pp=G.pendingPower,cur=G.players[G.cur];G.pendingPower=null;
  if(pp.type==='peek'){G.lastPow=cardObjClean(pp.card);G.phase='draw';G.newCardIdx=-1;render();nextTurn();olPush();return;}
  if(pp.type==='target'){
    var t=G.players[result.targetIdx];
    if(!t||!t.alive){var f=getOthersAlive().filter(function(p){return p.hand.length>0;});if(f.length)t=f[0];else{G.phase='draw';G.newCardIdx=-1;render();nextTurn();olPush();return;}}
    if((pp.card.id==='steal'||pp.card.id==='give')&&t.hand.length>0){var s=t.hand.splice(rnd(0,t.hand.length-1),1)[0];cur.hand.push(s);showNotif(pp.card.id==='steal'?'🗃️ KRADZIEŻ!':'🤝 WYMUSZENIE!',pp.card.id==='steal'?'#88ccff':'#ff88aa');}
    else if(pp.card.id==='double'){G.doubleTarget=G.players.indexOf(t);G.doublingTurn=false;showNotif('⏩ '+t.name+' GRA 2 KOLEJKI!','#ffcc44');}
    G.lastPow=cardObjClean(pp.card);G.phase='draw';G.newCardIdx=-1;render();nextTurn();olPush();return;
  }
  if(pp.type==='type'){
    var tid=result.typeId,tname=tid;G.deck.forEach(function(dc){if(dc.id===tid)tname=dc.name;});
    G.deck=G.deck.filter(function(dc){return dc.id!==tid;});G.discardPile=G.discardPile.filter(function(dc){return dc.id!==tid;});
    showNotif('🗑️ USUNIĘTO: '+tname,'#ff8844');G.lastPow=cardObjClean(pp.card);G.phase='draw';G.newCardIdx=-1;render();nextTurn();olPush();return;
  }
}

/* ── WIN / NEXT TURN ── */
function checkWin(){
  var alive=G.players.filter(function(p){return p.alive;});
  if(alive.length<=1){G.over=true;$id('win-ov').style.display='flex';$id('win-name').textContent=alive[0]?alive[0].name:'NIKT';return true;}
  return false;
}
function nextTurn(){
  if(!G||G.over)return;
  if(G.phase==='picking'||G.phase==='hitman-choice'||$id('angel-ov').style.display==='flex')return;
  var cnt=G.players.filter(function(p){return p.alive;}).length;if(cnt<=1){checkWin();return;}
  if(G.chainTurnsLeft>0){G.chainTurnsLeft--;if(G.chainTurnsLeft===0)G.chainedCard=null;}
  if(G.doubleTarget===G.cur&&!G.doublingTurn){
    G.doublingTurn=true;G.phase='draw';G.selectedCard=-1;G.drawsLeft=3;G.newCardIdx=-1;G.playedCardThisTurn=false;
    render();if(G.onlineMode)olPush();if(isCurBot())setTimeout(botTurn,1500);return;
  }
  G.doublingTurn=false;G.doubleTarget=-1;
  var n=G.players.length,next=(G.cur+G.direction+n)%n,tries=0;
  while(!G.players[next].alive&&tries<n){next=(next+G.direction+n)%n;tries++;}
  G.cur=next;G.phase='draw';G.selectedCard=-1;G.drawsLeft=3;G.newCardIdx=-1;G.playedCardThisTurn=false;
  render();if(G.onlineMode)olPush();if(isCurBot())setTimeout(botTurn,1500);
}

/* ── BOT AI ── */
function botDecide(bot,cb){
  var dl=G.deck.length,hits=0;for(var i=0;i<dl;i++)if(G.deck[i].id==='hitman')hits++;
  var risk=dl?hits/dl:0,wantDraw=false;
  if(G.drawsLeft>0&&dl>0){var pers=bot.personality||'cautious';if(pers==='aggressive')wantDraw=risk<0.32;else if(pers==='cautious')wantDraw=risk<0.14;else wantDraw=risk<0.22&&Math.random()<0.55;}
  if(wantDraw){setTimeout(function(){doDrawCard(function(){if(cb)cb();});},900);return;}
  var played=false;
  for(var i=0;i<bot.hand.length;i++){
    if(i===G.newCardIdx)continue;var c=bot.hand[i];if(!c||!c.power||c.id==='angel')continue;var sp=false;
    if(c.id==='shuffle'&&risk>0.28)sp=true;if(c.id==='fake'&&dl>8&&Math.random()<0.42)sp=true;
    if((c.id==='steal'||c.id==='give')&&getOthersAlive().some(function(p){return p.hand.length>=2;}))sp=true;
    if(sp){
      bot.hand.splice(i,1);if(G.newCardIdx>i)G.newCardIdx--;pushDiscard(c);
      if(c.id==='shuffle'){G.deck=shuffleArr(G.deck);showNotif(bot.name+': 🔀','#8888ff');}
      else if(c.id==='fake')showNotif(bot.name+': 🎪','#ffaa44');
      else if(c.id==='steal'||c.id==='give'){var tgts2=getOthersAlive().filter(function(p){return p.hand.length>0;});if(tgts2.length){tgts2.sort(function(a,b){return b.hand.length-a.hand.length;});var t2=tgts2[0];var s2=t2.hand.splice(rnd(0,t2.hand.length-1),1)[0];bot.hand.push(s2);showNotif(bot.name+': '+(c.id==='steal'?'🗃️':'🤝'),'#88ccff');}}
      G.lastPow=cardObjClean(c);played=true;break;
    }
  }
  G.newCardIdx=-1;G.phase='draw';render();setTimeout(function(){nextTurn();if(cb)cb();},played?700:0);
}
function botTurn(){if(!G||G.over)return;var cur=G.players[G.cur];if(!cur||!cur.alive){nextTurn();return;}setTimeout(function(){doDrawCard(null);},300);}

/* ── ONLINE ── */
var OL={peer:null,conn:null,code:null,name:'',isHost:false,pIdx:0,guestName:''};

function loadPeerJS(cb){if(window.Peer){cb();return;}var s=document.createElement('script');s.src='https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';s.onload=cb;s.onerror=function(){olStat('❌ Nie można załadować PeerJS.','#cc4444');};document.head.appendChild(s);}
function buildOnlineUI(){
  $id('online-content').innerHTML='<div class="slbl">TWOJE IMIĘ</div><input class="sinp" id="ol-nm" value="Gracz" maxlength="14"><div class="divider" style="margin:5px 0"></div>'+

    '<div class="slbl">KOD OD HOSTA</div><input class="sinp" id="ol-code" placeholder="wklej kod" maxlength="80" style="font-size:11px">'+
    '<button class="mbtn pri" style="width:100%" onclick="olJoin()">🔗 Dołącz</button>'+
    '<div id="ol-stat" style="font-size:12px;color:#c8a060;text-align:center;margin-top:6px;min-height:28px;line-height:1.5;font-family:IM Fell English,serif;padding:0 4px"></div>';
}
function olStat(m,c){var s=$id('ol-stat');if(s){s.innerHTML=m;s.style.color=c||'#c8a060';}}
function olSend(msg){if(OL.conn&&OL.conn.open)try{OL.conn.send(msg);}catch(e){}}

function olCreate(){
  var name=($id('ol-nm')&&$id('ol-nm').value.trim())||'Host';OL.name=name;OL.isHost=true;OL.pIdx=0;
  olShowLobby('…generuję kod…',true,name);olStat('Ładowanie PeerJS…','#88aaff');
  loadPeerJS(function(){
    try{
      OL.peer=new Peer(undefined,{debug:0});
      OL.peer.on('open',function(id){OL.code=id;var cb=$id('ol-cbox');if(cb){cb.firstChild.textContent=id;cb.style.color='#f5c842';}olStat('Wyślij kod znajomemu i czekaj','#88aaff');});
      OL.peer.on('connection',function(conn){if(OL.conn&&OL.conn!==conn)try{OL.conn.close();}catch(e){}OL.conn=conn;conn.on('data',function(d){olRecv(d);});conn.on('open',function(){olStat('Gość łączy się…','#ffcc44');setTimeout(function(){olSend({t:'ping'});},300);});conn.on('close',function(){if(G&&!G.over)showNotif('ROZŁĄCZONO','#cc4444');});});
      OL.peer.on('error',function(e){olStat('Błąd: '+e.type,'#cc4444');});
    }catch(e){olStat('Błąd PeerJS: '+e,'#cc4444');}
  });
}
function olJoin(){
  var name=($id('ol-nm')&&$id('ol-nm').value.trim())||'Gracz',code=($id('ol-code')&&$id('ol-code').value.trim())||'';
  if(!code){olStat('Wklej kod pokoju!','#cc4444');return;}
  OL.name=name;OL.isHost=false;OL.pIdx=1;OL.code=code;olShowLobby(code,false,name);olStat('Łączenie…','#88aaff');
  loadPeerJS(function(){
    try{
      OL.peer=new Peer(undefined,{debug:0});
      OL.peer.on('open',function(){
        OL.conn=OL.peer.connect(code,{reliable:true,serialization:'json'});
        OL.conn.on('open',function(){olStat('🟢 Połączono! Czekaj na start hosta…','#44ff88');olSend({t:'hi',name:name});OL._hiAcked=false;OL._hiRetry=setInterval(function(){if(OL._hiAcked){clearInterval(OL._hiRetry);return;}olSend({t:'hi',name:name});},2000);});
        OL.conn.on('data',function(d){olRecv(d);});OL.conn.on('close',function(){if(G&&!G.over)showNotif('HOST ROZŁĄCZYŁ SIĘ','#cc4444');});OL.conn.on('error',function(){olStat('Błąd połączenia','#cc4444');});
      });
      OL.peer.on('error',function(e){olStat('Nie można połączyć ('+e.type+')','#cc4444');});
    }catch(e){olStat('Błąd: '+e,'#cc4444');}
  });
}

function olPush(){
  if(!OL.isHost||!G)return;
  var pp=null;if(G.pendingPower){pp={card:G.pendingPower.card,type:G.pendingPower.type,targets:G.pendingPower.targets||null,types:G.pendingPower.types||null,cards:G.pendingPower.cards||null};}
  olSend({t:'state',s:{
    players:G.players.map(function(p){return{name:p.name,hand:p.hand.map(cardObjClean),alive:p.alive,char:p.char||'ghost',isBot:!!p.isBot,personality:p.personality||'human'};}),
    deck:G.deck.map(cardObjClean),discardPile:G.discardPile.slice(),discard:G.discard,cur:G.cur,phase:G.phase,over:G.over,
    direction:G.direction,drawsLeft:G.drawsLeft,newCardIdx:G.newCardIdx,selectedCard:G.selectedCard,lastPow:G.lastPow?cardObjClean(G.lastPow):null,
    chainedCard:G.chainedCard?cardObjClean(G.chainedCard):null,chainTurnsLeft:G.chainTurnsLeft||0,doubleTarget:G.doubleTarget||(-1),doublingTurn:!!G.doublingTurn,
    playedCardThisTurn:!!G.playedCardThisTurn,locked:false,pendingPower:pp
  }});
}

function olApplyState(s){
  if(!G||!s)return;
  if(s.players)for(var i=0;i<s.players.length&&i<G.players.length;i++){G.players[i].hand=s.players[i].hand||[];G.players[i].alive=s.players[i].alive;G.players[i].char=s.players[i].char||'ghost';}
  if(s.deck)G.deck=s.deck;if(s.discardPile)G.discardPile=s.discardPile;
  G.discard=s.discard||0;G.cur=s.cur||0;G.phase=s.phase||'draw';G.over=!!s.over;G.direction=s.direction||1;
  G.drawsLeft=s.drawsLeft!=null?s.drawsLeft:3;G.newCardIdx=s.newCardIdx!=null?s.newCardIdx:-1;G.selectedCard=s.selectedCard!=null?s.selectedCard:-1;
  G.lastPow=s.lastPow||null;G.chainedCard=s.chainedCard||null;G.chainTurnsLeft=s.chainTurnsLeft||0;G.doubleTarget=s.doubleTarget!=null?s.doubleTarget:-1;
  G.doublingTurn=!!s.doublingTurn;G.playedCardThisTurn=!!s.playedCardThisTurn;G.locked=false;G.pendingPower=s.pendingPower||null;
  if(G.over){var al=G.players.filter(function(p){return p.alive;});$id('win-ov').style.display='flex';var wn=$id('win-name');if(wn)wn.textContent=al[0]?al[0].name:'NIKT';render();return;}
  if(G.phase==='draw'){$id('hitman-ov').style.display='none';$id('angel-ov').style.display='none';$id('picker-ov').style.display='none';var po=$id('peek-ov');if(po)po.style.display='none';}
  /* Guest: hitman-choice */
  if(G.phase==='hitman-choice'&&G.cur===OL.pIdx){
    var myHand=G.players[OL.pIdx].hand,aIdx2=-1;for(var i=0;i<myHand.length;i++)if(myHand[i].id==='angel'){aIdx2=i;break;}
    showHitmanOverlay(G.players[OL.pIdx],aIdx2);
  }
  /* Guest: pendingPower picker */
  if(G.pendingPower&&G.cur===OL.pIdx){
    var pp=G.pendingPower;
    if(pp.type==='peek'){showPeekCards(pp.cards||[],false);}
    else if(pp.type==='target'){var tgts3=(pp.targets||[]).map(function(idx){return G.players[idx];}).filter(function(p){return p&&p.alive&&p.hand.length>0;});var ttl3=pp.card.id==='steal'?'🗃️ Ukradnij kartę od':pp.card.id==='give'?'🤝 Wymusz kartę od':'⏩ Kto gra 2 razy z rzędu?';showPicker(ttl3,tgts3,function(t){olSend({t:'act',a:{t:'picker-result',res:{targetIdx:G.players.indexOf(t)}}});});}
    else if(pp.type==='type')showTypePicker('🗑️ USUŃ RODZAJ KART',pp.types||[],function(tid){olSend({t:'act',a:{t:'picker-result',res:{typeId:tid}}});});
    else if(pp.type==='angel-place'){buildAngelButtons(G.deck.length,function(pos){$id('angel-ov').style.display='none';olSend({t:'act',a:{t:'angel-place',pos:pos}});});$id('angel-ov').style.display='flex';}
  }
  render();
}

function olDoGuestAction(a){
  if(!OL.isHost||!G)return;
  var cur=G.players[1];
  if(a.t==='draw'){if(G.cur!==1||G.phase!=='draw'||G.drawsLeft<=0||!G.deck.length){olPush();return;}G.locked=true;doDrawCard(function(){G.locked=false;render();olPush();});return;}
  if(a.t==='end'){if(G.cur!==1){olPush();return;}if(G.drawsLeft===3&&!G.playedCardThisTurn){olPush();return;}G.selectedCard=-1;G.newCardIdx=-1;if(G.phase==='hand-play')G.phase='draw';nextTurn();olPush();return;}
  if(a.t==='play'){if(G.cur!==1||!cur||!cur.alive){olPush();return;}var idx=a.i;if(idx<0||idx>=cur.hand.length){olPush();return;}var c=cur.hand[idx];if(!c||c.id==='angel'){olPush();return;}G.locked=true;cur.hand.splice(idx,1);if(G.newCardIdx>idx)G.newCardIdx--;G.selectedCard=-1;pushDiscard(c);if(c.power){executePower(c,cur,function(){G.locked=false;if(!G.pendingPower)olPush();});}else{G.playedCardThisTurn=true;G.phase='draw';G.newCardIdx=-1;nextTurn();G.locked=false;olPush();}return;}
  if(a.t==='use-angel'){if(!cur||!cur.alive){olPush();return;}var aI=a.aIdx;if(aI<0||aI>=cur.hand.length||cur.hand[aI].id!=='angel'){olPush();return;}cur.hand.splice(aI,1);if(G.newCardIdx>aI)G.newCardIdx--;G.pendingPower={card:{id:'angel'},type:'angel-place',cb:null};G.phase='hitman-choice';olPush();return;}
  if(a.t==='angel-place'){G.pendingPower=null;var pos2=Math.min(Math.max(0,a.pos),G.deck.length);G.deck.splice(pos2,0,{id:'hitman',name:'HITMAN',art:'🔫',type:'hit',power:false,uid:'hitman_ret_'+Date.now()});G.lastPow={id:'angel',name:'ANIOŁ',art:'😇',type:'pow',power:true};G.phase='draw';G.newCardIdx=-1;showNotif('😇 ANIOŁ RATUJE!','#ffff66');render();nextTurn();olPush();return;}
  if(a.t==='die'){if(!cur||!cur.alive){olPush();return;}cur.alive=false;G.phase='draw';G.lastPow=null;G.pendingPower=null;showNotif('💀 WYELIMINOWANY!','#ff2222');if(!checkWin())nextTurn();olPush();return;}
  if(a.t==='picker-result'){olResolvePendingPower(a.res);return;}
  if(a.t==='peek-done'){if(G.pendingPower&&G.pendingPower.type==='peek'){olResolvePendingPower({});}else olPush();return;}
  olPush();
}

function olRecv(d){
  if(!d||!d.t)return;
  if(d.t==='ping'&&!OL.isHost){olSend({t:'hi',name:OL.name});return;}
  if(d.t==='hi'&&OL.isHost){OL.guestName=d.name||'Gracz 2';var rp=$id('ol-players');if(rp)rp.innerHTML='<div style="color:#44ff88;font-family:Cinzel,serif;font-size:12px">● '+OL.name+' (Ty)</div><div style="color:#f5c842;font-family:Cinzel,serif;font-size:12px">● '+d.name+' 🔗</div>';olStat('🟢 '+d.name+' dołączył!','#44ff88');var sb=$id('ol-startbtn');if(sb)sb.style.display='block';olSend({t:'ok',host:OL.name,guest:d.name});return;}
  if(d.t==='ok'&&!OL.isHost){OL._hiAcked=true;if(OL._hiRetry)clearInterval(OL._hiRetry);var rp=$id('ol-players');if(rp)rp.innerHTML='<div style="color:#f5c842;font-family:Cinzel,serif;font-size:12px">● '+d.host+' (host)</div><div style="color:#44ff88;font-family:Cinzel,serif;font-size:12px">● '+d.guest+' (Ty)</div>';olStat('✅ Połączono! Czekaj na start hosta…','#44ff88');return;}
  if(d.t==='init'&&!OL.isHost){olInitGuestGame(d);return;}
  if(d.t==='state'&&!OL.isHost){olApplyState(d.s);return;}
  if(d.t==='act'&&OL.isHost){olDoGuestAction(d.a);return;}
}

function olStartGame(){
  if(!OL.isHost||!OL.guestName)return;
  CFG={hitman:1,s1:5,s2:5,s3:5,s4:5,shuffle:2,fake:2,angel:3,steal:2,give:2,cancel:2,peek:1,chain:1,addhit:1,reverse:2,copy:1,purge:1,double:1,bottom:1};
  var deck=buildDeck(),h1=[],h2=[];
  for(var i=0;i<3;i++){if(deck.length)h1.push(deck.pop());}for(var i=0;i<3;i++){if(deck.length)h2.push(deck.pop());}
  var players=[{name:OL.name,isBot:false,hand:h1,alive:true,char:cfgVals._playerChar||'ghost',personality:'human'},{name:OL.guestName,isBot:false,hand:h2,alive:true,char:'wolf',personality:'human'}];
  G=makeGameState(players,deck);G.onlineMode=true;OL.pIdx=0;
  olSend({t:'init',hName:OL.name,gName:OL.guestName,deck:deck.map(cardObjClean),h1:h1.map(cardObjClean),h2:h2.map(cardObjClean),hChar:cfgVals._playerChar||'ghost'});
  hideAllOverlays();$id('exit-btn').style.display='block';render();setTimeout(olPush,300);
}
function olInitGuestGame(d){
  var players=[{name:d.hName,isBot:false,hand:d.h1||[],alive:true,char:d.hChar||'ghost',personality:'human'},{name:d.gName,isBot:false,hand:d.h2||[],alive:true,char:'wolf',personality:'human'}];
  G=makeGameState(players,d.deck||[]);G.onlineMode=true;OL.pIdx=1;
  hideAllOverlays();$id('exit-btn').style.display='block';render();olSend({t:'act',a:{t:'guest-ready'}});
}
function hideAllOverlays(){['menu-ov','setup-ov','online-ov','win-ov','hitman-ov','angel-ov','picker-ov'].forEach(function(id){var e=$id(id);if(e)e.style.display='none';});var po=$id('peek-ov');if(po)po.style.display='none';}

function olShowLobby(code,isHost,myName){
  $id('online-ov').style.display='flex';
  $id('online-content').innerHTML=
    '<div class="slbl" style="font-size:10px">'+(isHost?'TWÓJ KOD — SKOPIUJ I WYŚLIJ':'ŁĄCZENIE Z')+'</div>'+
    '<div id="ol-cbox" onclick="olCopy()" style="font-size:clamp(8px,1.5vw,10px);word-break:break-all;color:#f5c842;padding:8px;border:1px solid var(--gold);border-radius:6px;background:#1a0e0488;text-align:center;cursor:pointer;max-width:min(320px,88vw);line-height:1.5"><span>'+code+'</span><br><span style="font-size:8px;color:#7a5a2a">kliknij aby skopiować</span></div>'+
    '<div id="ol-players" style="font-family:Cinzel,serif;font-size:12px;display:flex;flex-direction:column;gap:3px;text-align:center"><div style="color:'+(isHost?'#44ff88':'#f5c842')+'">● '+myName+(isHost?' (Ty — host)':' (Ty — gość)')+'</div></div>'+
    '<div id="ol-stat" style="font-size:12px;color:#c8a060;text-align:center;min-height:24px;font-family:IM Fell English,serif;line-height:1.5"></div>'+
    (isHost?'<button id="ol-startbtn" class="mbtn pri" style="width:100%;display:none" onclick="olStartGame()">▶ Rozpocznij grę</button>':'<div style="font-family:IM Fell English,serif;font-size:11px;color:#5a4018;text-align:center">Gdy host kliknie start, gra się rozpocznie automatycznie.</div>');
}
function olCopy(){
  if(!OL.code)return;
  try{navigator.clipboard.writeText(OL.code).then(function(){olStat('✓ Skopiowano kod!','#44ff88');});}
  catch(e){var ta=document.createElement('textarea');ta.value=OL.code;ta.style.cssText='position:fixed;top:0;left:0;opacity:0.01';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');olStat('✓ Skopiowano!','#44ff88');}catch(e2){olStat('Zaznacz i skopiuj ręcznie','#888');}document.body.removeChild(ta);}
}

/* ── CARD INFO PANEL — bottom strip, works on mobile & desktop ── */
(function(){
  var panel=null,art=null,nameEl=null,descEl=null,typeEl=null;
  function init(){
    panel=$id('card-info-panel');art=$id('cip-art');nameEl=$id('cip-name');descEl=$id('cip-desc');typeEl=$id('cip-type');
  }

  function showCard(cardEl){
    if(!panel)init();if(!panel)return;
    var name=cardEl.dataset.tipName,desc=cardEl.dataset.tipTxt,color=cardEl.dataset.tipColor,cArt=cardEl.dataset.art;
    if(!name||!desc)return;
    art.textContent=cArt||'🃏';
    nameEl.textContent=name;nameEl.style.color=color||'#f5c842';
    descEl.textContent=desc;
    // type label
    var t=cardEl.dataset.tipType||'';
    typeEl.textContent=t==='hit'?'KARTA ZAGROŻENIA':t==='safe'?'KARTA BEZPIECZNA':t==='pow'?'KARTA MOCY':'';
    panel.classList.add('visible');
  }

  function hideCard(){
    if(!panel)init();if(!panel)return;
    panel.classList.remove('visible');
  }

  // Desktop: hover
  document.addEventListener('mouseenter',function(e){
    var c=e.target&&e.target.closest?e.target.closest('[data-tip-name]'):null;
    if(c)showCard(c);
  },true);
  document.addEventListener('mouseleave',function(e){
    var c=e.target&&e.target.closest?e.target.closest('[data-tip-name]'):null;
    if(c)hideCard();
  },true);

  // Mobile + desktop: selected card shows info, deselect hides
  // Hook into renderHandAndButtons to update panel after every render
  var _hooked=false;
  function hookRender(){
    if(_hooked||!window.renderHandAndButtons)return;
    _hooked=true;
    var orig=window.renderHandAndButtons;
    window.renderHandAndButtons=function(){
      orig.call(this);
      var sel=document.querySelector('#hand-cards .hcard.selected[data-tip-name]');
      if(sel)showCard(sel); else hideCard();
    };
  }
  setTimeout(hookRender,100);
})();

showMenu();
</script>
